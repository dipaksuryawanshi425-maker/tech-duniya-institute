<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses - Tech Duniya Institute</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f7fb;
}

header{
  background:#0f172a;
  color:white;
  padding:20px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:26px;
  font-weight:bold;
}

.logout-btn{
  background:#ef4444;
  color:white;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.hero{
  text-align:center;
  padding:50px 20px;
}

.hero h1{
  font-size:38px;
  color:#0f172a;
}

.course-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  padding:40px 8%;
}

.course-card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.course-card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.course-content{
  padding:20px;
}

.course-content h3{
  margin-bottom:10px;
}

.btn{
  display:inline-block;
  background:#2563eb;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  margin-top:10px;
}

footer{
  background:#020617;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Tech Duniya Institute</div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<section class="hero">
  <h1>Welcome Student 🎓</h1>
  <p>तुझे Purchased Courses येथे दिसतील</p>
</section>

<section class="course-container">

  <div class="course-card">
    <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=900&q=80">
    <div class="course-content">
      <h3>MSCIT Course</h3>
      <p>Basic Computer Course Videos</p>
      <a href="https://youtube.com" class="btn" target="_blank">Watch Course</a>
    </div>
  </div>

  <div class="course-card">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=900&q=80">
    <div class="course-content">
      <h3>AI Tools Course</h3>
      <p>Latest AI Learning Videos</p>
      <a href="https://youtube.com" class="btn" target="_blank">Watch Course</a>
    </div>
  </div>

  <div class="course-card">
    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=900&q=80">
    <div class="course-content">
      <h3>Video Editing</h3>
      <p>Editing Training Videos</p>
      <a href="https://youtube.com" class="btn" target="_blank">Watch Course</a>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 Tech Duniya Institute</p>
</footer>

<script>
function logout(){
  window.location.href="login.html";
}
</script>

</body>
</html>
