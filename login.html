<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login - Tech Duniya Institute</title>

<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#2563eb);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box {
  background:white;
  padding:40px;
  border-radius:15px;
  width:350px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

.login-btn {
  background:#2563eb;
  color:white;
}

.google-btn {
  background:white;
  border:1px solid #ddd;
}

.msg {
  margin-top:10px;
  color:red;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Student Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button class="login-btn" onclick="signup()">Signup</button>
  <button class="login-btn" onclick="login()">Login</button>
  <button class="google-btn" onclick="googleLogin()">Login with Google</button>

  <p class="msg" id="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDs5_1sPbggFn9nJs5ABKb-qjHAeZ_gnK0",
  authDomain: "techduniyainstitute-dd6fc.firebaseapp.com",
  projectId: "techduniyainstitute-dd6fc",
  storageBucket: "techduniyainstitute-dd6fc.firebasestorage.app",
  messagingSenderId: "588369850360",
  appId: "1:588369850360:web:40593ae0365d8d5adaf00d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      document.getElementById("msg").innerHTML = "Signup Successful";
    })
    .catch((error) => {
      document.getElementById("msg").innerHTML = error.message;
    });
}

window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "course.html";
    })
    .catch((error) => {
      document.getElementById("msg").innerHTML = error.message;
    });
}

window.googleLogin = function() {
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then(() => {
      window.location.href = "course.html";
    })
    .catch((error) => {
      document.getElementById("msg").innerHTML = error.message;
    });
}

</script>

</body>
</html>
